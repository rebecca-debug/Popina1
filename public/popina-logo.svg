
<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft warm background just to make it popping if loaded stand-alone, but transparent for PNG -->
  <rect width="100%" height="100%" fill="none" />
  
  <g transform="translate(10, 10)">
    <!-- Letters: P O P I N A -->
    <g fill="none" stroke="#1C1C1C" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <!-- P -->
      <path d="M 120 70 L 120 210 M 120 70 L 170 70 A 35 35 0 0 1 170 140 L 120 140" />
      
      <!-- O -->
      <circle cx="270" cy="140" r="70" stroke-width="13" />
      
      <!-- P -->
      <path d="M 400 70 L 400 210 M 400 70 L 450 70 A 35 35 0 0 1 450 140 L 400 140" stroke-width="14" />
      
      <!-- I -->
      <path d="M 540 70 L 540 210" stroke-width="14" />
      
      <!-- N -->
      <path d="M 610 210 L 610 70 L 685 210 L 685 70" stroke-width="13" />
      
      <!-- A -->
      <path d="M 740 210 L 780 70 L 820 210 M 753 160 L 807 160" stroke-width="13" />
    </g>
    
    <!-- Organic sage-colored botanical accent leaf running under the text -->
    <path d="M 200 250 C 300 255, 500 255, 600 250" fill="none" stroke="#5A5A40" stroke-width="5" stroke-linecap="round" />
    <path d="M 400 252 C 410 248, 425 240, 420 232 C 415 224, 395 242, 400 252 Z" fill="#5A5A40" />
    <path d="M 440 252 C 452 249, 465 243, 462 235 C 458 227, 438 244, 440 252 Z" fill="#5A5A40" />
    <path d="M 480 252 C 492 249, 505 243, 502 235 C 498 227, 478 244, 480 252 Z" fill="#5A5A40" />
    
    <!-- Muted orange saffron dot representing the flavor heart of the brand -->
    <circle cx="615" cy="250" r="7" fill="#CC5300" />
  </g>
</svg>
