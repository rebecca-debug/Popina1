
<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="none" />
  
  <!-- Outer Ring and text container -->
  <circle cx="300" cy="300" r="230" fill="none" stroke="#5A5A40" stroke-width="3" stroke-dasharray="8 6" />
  <circle cx="300" cy="300" r="215" fill="none" stroke="#5A5A40" stroke-width="1.5" />
  
  <!-- Central Emblem background -->
  <circle cx="300" cy="300" r="160" fill="#F5F2ED" stroke="#1C1C1C" stroke-width="3" />
  
  <!-- Elegant Saffron Flower petals (styled abstract crocus) -->
  <g transform="translate(300, 310)">
    <!-- Back Petals -->
    <path d="M -40 -40 C -80 -120, 0 -160, 0 -160 C 0 -160, 80 -120, 40 -40 Z" fill="#A49F86" opacity="0.8" />
    <path d="M -60 -20 C -130 -80, -90 -130, -90 -130 C -90 -130, -20 -110, -10 -30 Z" fill="#5A5A40" opacity="0.6" />
    <path d="M 60 -20 C 130 -80, 90 -130, 90 -130 C 90 -130, 20 -110, 10 -30 Z" fill="#5A5A40" opacity="0.6" />

    <!-- Front Main Petals -->
    <path d="M 0 30 C -45 -40, -85 -100, -45 -140 C -15 -170, 0 -100, 0 30 Z" fill="#5A5A40" />
    <path d="M 0 30 C 45 -40, 85 -100, 45 -140 C 15 -170, 0 -100, 0 30 Z" fill="#5A5A40" />
    <path d="M -20 30 C -65 -30, -25 -120, 0 -150 C 25 -120, 65 -30, 20 30 Z" fill="#757555" />
    
    <!-- Flower Stem Base -->
    <path d="M -15 28 C -5 60, 5 60, 15 28 Z" fill="#5A5A40" />
    
    <!-- Saffron Threads (Stigmata) - High contrast, vibrant deep orange/crimson, blooming out -->
    <path d="M 3 10 C 10 -40, 35 -90, 75 -115 C 79 -117, 85 -110, 80 -105 C 45 -80, 25 -30, 5 15 Z" fill="#CC5300" />
    <path d="M -3 10 C -10 -40, -35 -90, -75 -115 C -79 -117, -85 -110, -80 -105 C -45 -80, -25 -30, -5 15 Z" fill="#CC5300" />
    <path d="M 0 15 C 0 -50, 10 -110, 0 -155 C -3 -160, 3 -160, 6 -155 C 15 -110, 5 -50, 0 15 Z" fill="#CC5300" />
    <path d="M 0 15 C 8 -35, 20 -70, 40 -95 C 43 -98, 47 -95, 45 -90 C 25 -65, 12 -35, 0 15 Z" fill="#E06000" />
    <path d="M 0 15 C -8 -35, -20 -70, -40 -95 C -43 -98, -47 -95, -45 -90 C -25 -65, -12 -35, 0 15 Z" fill="#E06000" />
  </g>
  
  <!-- "EST." and "2026" typography -->
  <text x="180" y="310" font-family="'Courier New', monospace, serif" font-weight="bold" font-size="20" fill="#1C1C1C" letter-spacing="4">EST.</text>
  <text x="365" y="310" font-family="'Courier New', monospace, serif" font-weight="bold" font-size="20" fill="#1C1C1C" letter-spacing="4">2026</text>
  
  <!-- "POPINA" bottom text -->
  <text x="300" y="420" font-family="sans-serif, system-ui" font-weight="900" font-size="34" fill="#1C1C1C" text-anchor="middle" letter-spacing="14">POPINA</text>
  <text x="300" y="445" font-family="sans-serif, system-ui" font-weight="bold" font-size="12" fill="#5A5A40" text-anchor="middle" letter-spacing="5">SAFFRON</text>
</svg>
